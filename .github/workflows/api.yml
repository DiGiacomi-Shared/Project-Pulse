name: Project Pulse API CI/CD

on:
  push:
    branches: [ main ]
    tags: [ 'v*' ]
    paths:
      - 'src/api/**'
      - 'Dockerfile.api'
      - 'requirements.txt'
      - '.github/workflows/api.yml'
  pull_request:
    branches: [ main ]
    paths:
      - 'src/api/**'
      - 'Dockerfile.api'
      - 'requirements.txt'
      - '.github/workflows/api.yml'
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: digiacomi-shared/project-pulse-api

jobs:
  # ============================================
  # Lint & Test
  # ============================================
  lint-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        working-directory: ./src/api
        run: |
          pip install -r requirements.txt
          pip install pytest pytest-asyncio pytest-cov ruff black mypy

      - name: Run Ruff (linter)
        working-directory: ./src/api
        run: ruff check . || echo "Lint issues found (non-blocking)"

      - name: Run Black (format check)
        working-directory: ./src/api
        run: black --check . || echo "Format issues found (non-blocking)"

      - name: Run MyPy (type check)
        working-directory: ./src/api
        run: mypy . || echo "Type issues found (non-blocking)"

      - name: Run tests
        working-directory: ./src/api
        run: pytest tests/ -v --cov=src --cov-report=xml --cov-report=term || echo "Tests failed (non-blocking)"

      - name: Upload coverage
        uses: codecov/codecov-action@v4
        if: github.event_name == 'push'
        with:
          files: ./src/api/coverage.xml
          fail_ci_if_error: false

  # ============================================
  # Build and Push
  # ============================================
  build:
    runs-on: ubuntu-latest
    needs: lint-test
    permissions:
      contents: read
      packages: write
    outputs:
      image-tag: ${{ steps.meta.outputs.tags }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha,prefix=,suffix=,format=short
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Login to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push API image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile.api
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            GIT_SHA=${{ github.sha }}
          cache-from: type=gha,scope=api-${{ github.ref_name }}
          cache-to: type=gha,mode=max,scope=api-${{ github.ref_name }}
          platforms: linux/amd64

  # ============================================
  # Deploy (main branch only)
  # ============================================
  deploy:
    runs-on: ubuntu-latest
    needs: build
    if: (github.event_name == 'push' || github.event_name == 'workflow_dispatch') && github.ref == 'refs/heads/main'
    permissions:
      contents: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Tailscale
        uses: tailscale/github-action@v2
        with:
          authkey: ${{ secrets.TAILSCALE_AUTH_KEY }}
          args: '--accept-routes --accept-dns'

      - name: Setup kubectl
        run: |
          mkdir -p ~/.kube
          echo "${{ secrets.KUBE_CONFIG }}" | base64 -d > ~/.kube/config
          chmod 600 ~/.kube/config
          kubectl config set-cluster default --insecure-skip-tls-verify=true --server=https://100.91.146.79:6443

      - name: Deploy to Kubernetes
        run: |
          # Apply manifests with TLS verification disabled
          kubectl apply -k k8s/ -n project-pulse --validate=false

          # Update images
          kubectl set image deployment/pulse-api \
            pulse-api=ghcr.io/digiacomi-shared/project-pulse-api:latest \
            -n project-pulse

          kubectl set image deployment/pulse-workers \
            worker=ghcr.io/digiacomi-shared/project-pulse-api:latest \
            -n project-pulse

          kubectl set image deployment/pulse-beat \
            beat=ghcr.io/digiacomi-shared/project-pulse-api:latest \
            -n project-pulse

      - name: Verify deployment
        run: |
          kubectl rollout status deployment/pulse-api -n project-pulse --timeout=5m
          kubectl rollout status deployment/pulse-workers -n project-pulse --timeout=5m
