name: Project Pulse API CI/CD

on:
  push:
    branches: [main]
    tags: ['v*']
    paths:
      - 'src/api/**'
      - 'src/api/Dockerfile'
      - 'src/api/requirements.txt'
      - '.github/workflows/api.yml'
  pull_request:
    branches: [main]
    paths:
      - 'src/api/**'
      - 'src/api/Dockerfile'
      - 'src/api/requirements.txt'
      - '.github/workflows/api.yml'
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: digiacomi-shared/project-pulse-api

jobs:
  # ============================================
  # Lint & Test
  # ============================================
  lint-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          cd src/api
          pip install -r requirements.txt
          pip install pytest pytest-asyncio ruff black mypy

      - name: Run Ruff (linter)
        run: |
          cd src/api
          ruff check . || echo "Lint issues found (non-blocking)"

      - name: Run Black (format check)
        run: |
          cd src/api
          black --check . || echo "Format issues found (non-blocking)"

      - name: Run MyPy (type check)
        run: |
          cd src/api
          mypy . || echo "Type issues found (non-blocking)"

  # ============================================
  # Build and Push
  # ============================================
  build:
    runs-on: ubuntu-latest
    needs: lint-test
    permissions:
      contents: read
      packages: write
    outputs:
      image-tag: ${{ steps.meta.outputs.tags }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha,prefix=,suffix=,format=short
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Login to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push API image
        uses: docker/build-push-action@v5
        with:
          context: ./src/api
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            GIT_SHA=${{ github.sha }}
          cache-from: type=gha,scope=api-${{ github.ref_name }}
          cache-to: type=gha,mode=max,scope=api-${{ github.ref_name }}
          platforms: linux/amd64

  # ============================================
  # Deploy to K3s
  # ============================================
  deploy:
    runs-on: ubuntu-latest
    needs: build
    if: (github.event_name == 'push' || github.event_name == 'workflow_dispatch') && github.ref == 'refs/heads/main'
    permissions:
      contents: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup SSH for K3s
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.K3S_HOST }}
          username: ${{ secrets.K3S_USER }}
          key: ${{ secrets.K3S_SSH_KEY }}
          script: |
            echo "Connected to K3s"

      - name: Deploy to K3s
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.K3S_HOST }}
          username: ${{ secrets.K3S_USER }}
          key: ${{ secrets.K3S_SSH_KEY }}
          script: |
            # Import new image
            sudo k3s ctr images pull ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest

            # Update deployment
            sudo kubectl set image deployment/pulse-api \
              pulse-api=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest \
              -n project-pulse

            # Update workers
            sudo kubectl set image deployment/pulse-workers \
              worker=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest \
              -n project-pulse

            # Update beat scheduler
            sudo kubectl set image deployment/pulse-beat \
              beat=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest \
              -n project-pulse

      - name: Verify deployment
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.K3S_HOST }}
          username: ${{ secrets.K3S_USER }}
          key: ${{ secrets.K3S_SSH_KEY }}
          script: |
            sudo kubectl rollout status deployment/pulse-api -n project-pulse --timeout=5m
            sudo kubectl rollout status deployment/pulse-workers -n project-pulse --timeout=5m
