apiVersion: apps/v1
kind: Deployment
metadata:
  name: pulse-api
  namespace: project-pulse
spec:
  replicas: 1
  selector:
    matchLabels:
      app: pulse-api
  template:
    metadata:
      labels:
        app: pulse-api
    spec:
      containers:
        - name: api
          image: project-pulse-api:latest
          imagePullPolicy: Never
          ports:
            - containerPort: 8000
          env:
            - name: ACE_PG_HOST
              value: "100.102.10.75"
            - name: ACE_PG_PORT
              value: "5432"
            - name: ACE_PG_DATABASE
              value: "context_engine"
            - name: ACE_PG_USER
              value: "context_engine"
            - name: ACE_PG_PASSWORD
              value: "ctx2024engine"
            - name: OLLAMA_URL
              value: "http://100.100.227.127:11434"
            - name: OLLAMA_MODEL
              value: "nomic-embed-text"
            - name: CORS_ORIGINS
              value: '["*"]'
          resources:
            requests:
              memory: "512Mi"
              cpu: "250m"
            limits:
              memory: "1Gi"
              cpu: "1000m"
          readinessProbe:
            httpGet:
              path: /api/health
              port: 8000
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /api/health
              port: 8000
            initialDelaySeconds: 10
            periodSeconds: 30
      nodeSelector:
        kubernetes.io/hostname: minis-server
---
apiVersion: v1
kind: Service
metadata:
  name: pulse-api
  namespace: project-pulse
spec:
  selector:
    app: pulse-api
  ports:
    - port: 80
      targetPort: 8000
