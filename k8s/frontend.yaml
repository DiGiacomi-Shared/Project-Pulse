apiVersion: apps/v1
kind: Deployment
metadata:
  name: pulse-frontend
  namespace: project-pulse
  labels:
    app.kubernetes.io/name: project-pulse
    app.kubernetes.io/component: frontend
    environment: production
spec:
  replicas: 1
  selector:
    matchLabels:
      app: pulse-frontend
  template:
    metadata:
      labels:
        app: pulse-frontend
        app.kubernetes.io/name: project-pulse
        app.kubernetes.io/component: frontend
    spec:
      imagePullSecrets:
        - name: ghcr-registry-secret
      containers:
        - name: frontend
          image: ghcr.io/michaeldigiacomi/project-pulse-frontend:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 80
          resources:
            requests:
              memory: "32Mi"
              cpu: "50m"
            limits:
              memory: "64Mi"
              cpu: "100m"
      nodeSelector:
        kubernetes.io/hostname: minis-server
---
apiVersion: v1
kind: Service
metadata:
  name: pulse-frontend
  namespace: project-pulse
  labels:
    app.kubernetes.io/name: project-pulse
    app.kubernetes.io/component: frontend
spec:
  selector:
    app: pulse-frontend
  ports:
    - port: 80
      targetPort: 80