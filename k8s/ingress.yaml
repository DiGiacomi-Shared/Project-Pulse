# HTTP -> HTTPS redirect ingress
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: pulse-ingress-http
  namespace: project-pulse
  annotations:
    traefik.ingress.kubernetes.io/router.entrypoints: "web"
    traefik.ingress.kubernetes.io/router.middlewares: "project-pulse-redirect-https@kubernetescrd"
spec:
  rules:
    - host: pulse.digitaladrenalin.net
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: pulse-frontend
                port:
                  number: 80
---
# HTTPS ingress
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: pulse-ingress-https
  namespace: project-pulse
  annotations:
    cert-manager.io/cluster-issuer: "letsencrypt-prod"
    traefik.ingress.kubernetes.io/router.entrypoints: "websecure"
    traefik.ingress.kubernetes.io/router.tls: "true"
spec:
  tls:
    - hosts:
        - pulse.digitaladrenalin.net
      secretName: pulse-tls
  rules:
    - host: pulse.digitaladrenalin.net
      http:
        paths:
          - path: /api
            pathType: Prefix
            backend:
              service:
                name: pulse-api
                port:
                  number: 80
          - path: /
            pathType: Prefix
            backend:
              service:
                name: pulse-frontend
                port:
                  number: 80
---
# Redirect middleware
apiVersion: traefik.io/v1alpha1
kind: Middleware
metadata:
  name: redirect-https
  namespace: project-pulse
spec:
  redirectScheme:
    scheme: https
    permanent: true
