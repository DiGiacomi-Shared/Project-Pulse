apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: pulse-ingress
  namespace: project-pulse
spec:
  rules:
    - http:
        paths:
          - path: /api
            pathType: Prefix
            backend:
              service:
                name: pulse-api
                port:
                  number: 80
          - path: /
            pathType: Prefix
            backend:
              service:
                name: pulse-frontend
                port:
                  number: 80
