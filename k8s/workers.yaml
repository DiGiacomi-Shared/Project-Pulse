apiVersion: apps/v1
kind: Deployment
metadata:
  name: pulse-workers
  namespace: project-pulse
spec:
  replicas: 1
  selector:
    matchLabels:
      app: pulse-workers
  template:
    metadata:
      labels:
        app: pulse-workers
    spec:
      imagePullSecrets:
        - name: ghcr-registry-secret
      containers:
        - name: worker
          image: ghcr.io/digiacomi-shared/project-pulse-api:latest
          imagePullPolicy: Always
          command: ["celery", "-A", "tasks", "worker", "--loglevel=info", "-n", "worker@%h"]
          env:
            - name: DATABASE_URL
              value: "postgresql+asyncpg://project_pulse:project_pulse_123@100.102.10.75:5432/project_pulse"
            - name: REDIS_URL
              value: "redis://100.102.10.75:6379/0"
            - name: GITHUB_TOKEN
              valueFrom:
                secretKeyRef:
                  name: github-token
                  key: token
            - name: BRAIN_PG_HOST
              value: "100.102.10.75"
            - name: BRAIN_PG_DATABASE
              value: "brain"
            - name: BRAIN_PG_USER
              value: "postgres"
            - name: BRAIN_PG_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: brain-pg-password
                  key: password
            - name: GITHUB_REPOS
              valueFrom:
                configMapKeyRef:
                  name: pulse-config
                  key: repos
          resources:
            requests:
              memory: "128Mi"
              cpu: "100m"
            limits:
              memory: "256Mi"
              cpu: "200m"
      nodeSelector:
        kubernetes.io/hostname: k3s
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: pulse-beat
  namespace: project-pulse
spec:
  replicas: 1
  selector:
    matchLabels:
      app: pulse-beat
  template:
    metadata:
      labels:
        app: pulse-beat
    spec:
      imagePullSecrets:
        - name: ghcr-registry-secret
      containers:
        - name: beat
          image: ghcr.io/digiacomi-shared/project-pulse-api:latest
          imagePullPolicy: Always
          command: ["celery", "-A", "tasks", "beat", "--loglevel=info"]
          env:
            - name: DATABASE_URL
              value: "postgresql+asyncpg://project_pulse:project_pulse_123@100.102.10.75:5432/project_pulse"
            - name: REDIS_URL
              value: "redis://100.102.10.75:6379/0"
            - name: GITHUB_TOKEN
              valueFrom:
                secretKeyRef:
                  name: github-token
                  key: token
            - name: BRAIN_PG_HOST
              value: "100.102.10.75"
            - name: BRAIN_PG_DATABASE
              value: "brain"
            - name: BRAIN_PG_USER
              value: "postgres"
            - name: BRAIN_PG_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: brain-pg-password
                  key: password
            - name: GITHUB_REPOS
              valueFrom:
                configMapKeyRef:
                  name: pulse-config
                  key: repos
          resources:
            requests:
              memory: "64Mi"
              cpu: "50m"
            limits:
              memory: "128Mi"
              cpu: "100m"
      nodeSelector:
        kubernetes.io/hostname: k3s
