apiVersion: apps/v1
kind: Deployment
metadata:
  name: pulse-workers
  namespace: project-pulse
spec:
  replicas: 1
  selector:
    matchLabels:
      app: pulse-workers
  template:
    metadata:
      labels:
        app: pulse-workers
    spec:
      containers:
        - name: worker
          image: project-pulse-api:latest
          imagePullPolicy: IfNotPresent
          command: ["celery", "-A", "tasks", "worker", "--loglevel=info", "-n", "worker@%h"]
          env:
            - name: DATABASE_URL
              value: "postgresql+asyncpg://pulse:pulse@postgres:5432/pulse"
            - name: REDIS_URL
              value: "redis://redis:6379/0"
            - name: BRAIN_DB_PATH
              value: "/data/brain"
            - name: GITHUB_TOKEN
              valueFrom:
                secretKeyRef:
                  name: github-token
                  key: token
            - name: GITHUB_REPOS
              valueFrom:
                configMapKeyRef:
                  name: pulse-config
                  key: repos
          volumeMounts:
            - name: brain-storage
              mountPath: /data/brain
              readOnly: true
          resources:
            requests:
              memory: "128Mi"
              cpu: "100m"
            limits:
              memory: "256Mi"
              cpu: "200m"
      volumes:
        - name: brain-storage
          persistentVolumeClaim:
            claimName: brain-pvc
            readOnly: true
      nodeSelector:
        kubernetes.io/hostname: Legion5
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: pulse-beat
  namespace: project-pulse
spec:
  replicas: 1
  selector:
    matchLabels:
      app: pulse-beat
  template:
    metadata:
      labels:
        app: pulse-beat
    spec:
      containers:
        - name: beat
          image: project-pulse-api:latest
          imagePullPolicy: IfNotPresent
          command: ["celery", "-A", "tasks", "beat", "--loglevel=info"]
          env:
            - name: DATABASE_URL
              value: "postgresql+asyncpg://pulse:pulse@postgres:5432/pulse"
            - name: REDIS_URL
              value: "redis://redis:6379/0"
            - name: BRAIN_DB_PATH
              value: "/data/brain"
            - name: GITHUB_TOKEN
              valueFrom:
                secretKeyRef:
                  name: github-token
                  key: token
            - name: GITHUB_REPOS
              valueFrom:
                configMapKeyRef:
                  name: pulse-config
                  key: repos
          volumeMounts:
            - name: brain-storage
              mountPath: /data/brain
              readOnly: true
          resources:
            requests:
              memory: "64Mi"
              cpu: "50m"
            limits:
              memory: "128Mi"
              cpu: "100m"
      volumes:
        - name: brain-storage
          persistentVolumeClaim:
            claimName: brain-pvc
            readOnly: true
      nodeSelector:
        kubernetes.io/hostname: Legion5
